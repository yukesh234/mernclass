<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box{
        width: 100px;
        height: 100px;
    
    }
    .a{
        background-color: red;
        position:relative;
        left:30px;
        top:40px;
    }
    .b{
        background-color: blue;
        position:fixed;
        right: 0;
        top:0;
    }
    .c{
        background: gray;
        position:sticky;
        top:0;
    }
    body{
        height: 2000px;
    }
</style>
<body>
    <div class="box a"></div>
    <div class="box b"></div>
    <div class="box c"></div>
</body>
</html>
