<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body class="bg-[#d1d1d1aa]">
    <div class="min-h-screen flex justify-center items-center bg-[#ffffff]">
        <div class="border-gray-300 border-[0.5px] rounded-lg px-6 py-4 flex flex-col">
            <h1 class="m-4 p-3 font-bold text-2xl">Login to your account</h1>
            <form action="" class="flex flex-col gap-3 w-[400px]">
                <label for="email" class="font-medium">Email</label>
                <input type="email" name="email" id="email" class="
                border-gray-300 border-[0.5px] px-2 py-2 rounded-lg 
                ">
                <label for="password" class="font-medium">Password</label>
                <input type="password" name="password" id="password" class="px-2 py-2
                 border-gray-300 border-[0.5px] rounded-lg 
                ">
                <button type="submit" class="
                bg-[#1d4fd8e5] text-white p-2 rounded
                mt-3
                ">Login</button>
                <p class="m-2 p-2 mx-auto font-light text-sm">Don't have an account?<a class="text-blue-800 font-medium" href=""> Sign Up</a></p>
            </form>

        </div>
    </div>
</body>
</html>
